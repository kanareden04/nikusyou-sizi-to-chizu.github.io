<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>まだまだあるよ</title>
    <style>
        /* 全体の設定 */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 20px; /* 画面端に文字がくっつかないように余白を作る */
            display: flex;
            flex-direction: column; /* 要素を縦に並べる */
            align-items: center;    /* 中央寄せにする */
            background-color: #f9f9f9;
        }

        /* 文章が入るエリアの設定 */
        .content {
            max-width: 800px; /* 読みやすい幅に制限する */
            width: 100%;
            text-align: center; /* 文字を中央に */
            margin-bottom: 30px; /* 画像との間に隙間を作る */
        }

        h1 {
            font-size: 2rem;
            color: #1a1a1a;
        }

        p {
            font-size: 1.1rem;
        }

        /* 画像の設定 */
        .photo-container {
            max-width: 800px; /* 画像が大きすぎないように制限 */
            width: 100%;
        }

        img {
            width: 100%;      /* 横幅いっぱいに広げる */
            height: auto;     /* 高さは自動調整（比率を維持） */
            border-radius: 8px; /* 角を少し丸くすると今風になります */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* 軽い影をつけて浮かせる */
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>よく見つけた</h1>
        <p>R/Sへ向かえ</p>
    </div>

    <div class="photo-container">
        <img src="B Web.png" alt="地図">
    </div>

</body>
</html>
